worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  server_tokens off;

  # Use writable paths so the image can run as a non-root user if needed.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  access_log /dev/stdout;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint — static 200 JSON, no filesystem lookup.
    location = /health {
      default_type application/json;
      return 200 '{"status":"ok"}';
    }

    # Runtime config — short cache so updated env values propagate on redeploy.
    location = /env.js {
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      try_files /env.js =404;
    }

    # Hashed asset bundles — safe to cache aggressively.
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # SPA fallback — serve index.html for any unknown path.
    location / {
      add_header Cache-Control "no-cache" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
